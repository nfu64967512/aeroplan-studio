[pytest]
# 測試收集路徑僅限 tests/ 目錄，避免 pytest 嘗試匯入專案根 __init__.py
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 忽略專案根的 package-style __init__.py
norecursedirs = .claude assets data sitl __pycache__ .git

# 輸出設定
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:cacheprovider
    --import-mode=importlib

# 自訂 marker
markers =
    slow: 需要較長時間的測試 (> 5 秒)
    integration: 需要完整環境的整合測試
